name: Keep Supabase Alive
on:
  schedule:
    - cron: '0 0 * * 1,4' # Runs every Monday and Thursday at midnight
  workflow_dispatch:      # Allows you to click a button to test it
jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Database
        run: |
          curl -X GET "https://ofrngrggkgtfnfdlbmum.supabase.co" \
          -H "apikey: ${{ secrets.SUPABASE_KEY }}" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_KEY }}"
