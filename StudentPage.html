<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EduTag - Student Dashboard</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="student-style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <!-- Animated background shapes -->
  <div class="bg-shape"></div>
  <div class="bg-shape"></div>
  <div class="bg-shape"></div>

  <div class="dashboard-container">
    <!-- Header -->
    <header class="header">
      <div class="logo">
        <img src="pnsa-logo.png" alt="Logo">
        <h2>Philippine Nursing Students' Association</h2>
      </div>
      <div class="user-info">
        <i class="fas fa-user-circle"></i>
        <span id="studentName">Loading...</span>
      </div>
    </header>

    <!-- Events Panel -->
    <section class="panel">
      <h3><i class="fas fa-calendar-alt"></i> Events</h3>
      <div id="eventsList" class="list">
        <p>Loading events...</p>
      </div>
    </section>

   <!-- Sanctions Panel -->
<section class="panel">
  <div class="panel-header">
    <h3><i class="fas fa-exclamation-triangle"></i> Your Sanction/s</h3>
    <span id="totalFee">Total Fee: ₱0</span>
  </div>
  <div id="sanctionsList" class="list">
    <p>Loading sanctions...</p>
  </div>
</section>


  <!-- ✅ External JS -->
  <script src="student.js"></script>
</body>
</html>
