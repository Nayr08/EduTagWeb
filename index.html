<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EduTag - Login</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="login-style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg'><text y='16' font-size='16' fill='%23000'>📚</text></svg>">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <!-- Animated background shapes -->
  <div class="bg-shape"></div>
  <div class="bg-shape"></div>
  <div class="bg-shape"></div>

  <div class="login-container">
    <!-- Logo Section -->
    <div class="logo-section">
      <div class="logo">
        <img src="pnsa-logo.png" alt="Logo">
      </div>
      <h2 class="app-name">Philippine Nursing Students' Association</h2>
    </div>

    <!-- Error Message -->
    <div id="errorMessage" class="error-message">
      <i class="fas fa-exclamation-circle"></i>
      <span id="errorText"></span>
    </div>

    <!-- Login Form -->
    <form id="loginForm">
      <!-- Role Selection -->
      <div class="role-selector">
        <div class="role-option active" data-role="student">
          <i class="fas fa-user-graduate"></i>
          <div>Student</div>
        </div>
        <div class="role-option" data-role="admin">
          <i class="fas fa-user-shield"></i>
          <div>Admin</div>
        </div>
      </div>

      <!-- Username -->
      <div class="form-group">
        <label for="username">Student ID</label>
        <div class="input-wrapper">
          <i class="fas fa-user"></i>
          <input type="text" id="username" class="form-control" placeholder="Enter your Student ID " autocomplete="username" required>
        </div>
      </div>

      <!-- Password -->
      <div class="form-group">
        <label for="password">Password</label>
        <div class="input-wrapper">
          <i class="fas fa-lock"></i>
          <input type="password" id="password" class="form-control" placeholder="Enter your password" autocomplete="current-password" required>
          <button type="button" class="password-toggle" id="togglePassword">
            <i class="fas fa-eye" id="passwordToggleIcon"></i>
          </button>
        </div>
      </div>

      <!-- Login Button -->
      <button type="submit" class="login-btn" id="loginBtn">
        <div class="btn-loading" id="btnLoading">
          <div class="spinner"></div>
        </div>
        <span id="btnText">Sign In</span>
      </button>
    </form>

    <!-- Footer -->
   <div class="footer-text">
  © 2025 Philippine Nursing Students' Association. All rights reserved.<br>
  Developed for RFID Attendance & Student Management
</div>

  </div>

  <!-- ✅ External JS -->
  <script src="login.js"></script>
  <script src="https://unpkg.com/bcryptjs@2.4.3/dist/bcrypt.min.js"></script>
</body>
</html>
